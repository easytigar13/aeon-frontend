<!DOCTYPE html>
<html>
<head><title>Generating AEON logo PNG...</title></head>
<body style="background:#0C0C0C;color:#F5A623;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px">
  <canvas id="c" width="400" height="400" style="border:1px solid #333;border-radius:8px"></canvas>
  <div id="msg">Loading SVG...</div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const msg = document.getElementById('msg');
    const img = new Image();
    img.onload = function() {
      ctx.drawImage(img, 0, 0, 400, 400);
      msg.textContent = 'Downloading aeon-logo.png...';
      setTimeout(() => {
        const link = document.createElement('a');
        link.download = 'aeon-logo.png';
        link.href = canvas.toDataURL('image/png');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        msg.textContent = '✓ aeon-logo.png downloaded! Check your Downloads folder.';
      }, 500);
    };
    img.onerror = () => { msg.textContent = 'Error loading SVG — make sure logo.svg is in the same folder'; };
    img.src = 'logo.svg';
  </script>
</body>
</html>
