<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD862"/>
      <stop offset="100%" stop-color="#E8900A"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD862" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E8900A" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="88" fill="#0C0C0C"/>

  <!-- Subtle background glow -->
  <circle cx="200" cy="200" r="120" fill="url(#g2)" filter="url(#softglow)" opacity="0.6"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.35"/>
  <!-- Mid ring -->
  <circle cx="200" cy="200" r="162" fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.15"/>

  <!-- The A — geometric stroke letterform -->
  <g filter="url(#glow)">
    <!-- Left leg + right leg of A -->
    <path d="M200,82 L322,312 M200,82 L78,312"
      fill="none" stroke="url(#g1)" stroke-width="22"
      stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Crossbar -->
    <line x1="132" y1="226" x2="268" y2="226"
      stroke="url(#g1)" stroke-width="22" stroke-linecap="round"/>
  </g>

  <!-- Corner accent dots -->
  <circle cx="200" cy="200" r="3" fill="url(#g1)" opacity="0.6"/>
</svg>
